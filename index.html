<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅遊出發清單 | 台灣人出國必備</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #2b6cb0 0%, #4299e1 100%);
      color: white;
      padding: 40px 20px 36px;
      text-align: center;
    }

    header .icon { font-size: 2.8rem; margin-bottom: 10px; }
    header h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    header p { font-size: 0.9rem; opacity: 0.85; }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #a0aec0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .country-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .country-card:active {
      transform: scale(0.98);
    }

    .country-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .card-inner {
      display: flex;
      align-items: center;
      padding: 20px;
      gap: 16px;
    }

    .card-flag {
      font-size: 2.8rem;
      flex-shrink: 0;
      width: 56px;
      text-align: center;
    }

    .card-body { flex: 1; }

    .card-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 8px;
    }

    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }

    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 99px;
    }

    .tag-green { background: #f0fff4; color: #276749; }
    .tag-blue  { background: #ebf8ff; color: #2b6cb0; }
    .tag-gray  { background: #f7fafc; color: #4a5568; }

    .card-arrow {
      color: #cbd5e0;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .card-bar {
      height: 4px;
    }

    .coming-soon {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0.5;
    }

    .coming-soon .card-flag { font-size: 2.4rem; }
    .coming-soon .card-title { font-size: 1rem; font-weight: 700; }
    .coming-soon .label {
      font-size: 0.75rem;
      color: #a0aec0;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #a0aec0;
      padding-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="icon">✈️</div>
  <h1>旅遊出發清單</h1>
  <p>台灣人出國必備・選擇你的目的地</p>
</header>

<div class="container">

  <div class="section-label">選擇目的地</div>

  <!-- 中國 -->
  <a href="china-checklist.html" class="country-card">
    <div class="card-bar" style="background: linear-gradient(90deg, #c0392b, #e74c3c);"></div>
    <div class="card-inner">
      <div class="card-flag">🇨🇳</div>
      <div class="card-body">
        <div class="card-title">中國大陸</div>
        <div class="card-subtitle">廣州・上海・北京 等</div>
        <div class="tag-row">
          <span class="tag tag-blue">需台胞證</span>
          <span class="tag tag-gray">需 VPN</span>
          <span class="tag tag-gray">銀聯卡</span>
        </div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <!-- 日本 -->
  <a href="japan-checklist.html" class="country-card">
    <div class="card-bar" style="background: linear-gradient(90deg, #c0392b, #fff);"></div>
    <div class="card-inner">
      <div class="card-flag">🇯🇵</div>
      <div class="card-body">
        <div class="card-title">日本</div>
        <div class="card-subtitle">東京・大阪・京都・北海道 等</div>
        <div class="tag-row">
          <span class="tag tag-green">免簽 90 天</span>
          <span class="tag tag-gray">IC 卡</span>
          <span class="tag tag-gray">備現金</span>
        </div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <!-- 韓國 -->
  <a href="korea-checklist.html" class="country-card">
    <div class="card-bar" style="background: linear-gradient(90deg, #c0392b, #3182ce);"></div>
    <div class="card-inner">
      <div class="card-flag">🇰🇷</div>
      <div class="card-body">
        <div class="card-title">韓國</div>
        <div class="card-subtitle">首爾・釜山・濟州島 等</div>
        <div class="tag-row">
          <span class="tag tag-green">免簽 90 天</span>
          <span class="tag tag-gray">T-money 卡</span>
          <span class="tag tag-gray">Naver Maps</span>
        </div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <div class="section-label" style="margin-top: 28px;">即將推出</div>

  <div class="coming-soon">
    <div class="card-flag">🇪🇺</div>
    <div>
      <div class="card-title">歐洲各國</div>
      <div class="label">準備中・Coming Soon</div>
    </div>
  </div>

  <div class="coming-soon">
    <div class="card-flag">🇺🇸</div>
    <div>
      <div class="card-title">美國</div>
      <div class="label">準備中・Coming Soon</div>
    </div>
  </div>

  <footer>台灣旅遊出發清單 · 資訊僅供參考，出發前請確認最新規定</footer>
</div>

</body>
</html>
